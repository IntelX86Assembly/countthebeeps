<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beeps Count Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  #game {
    text-align: center;
    width: 92%;
    max-width: 520px;
  }

  h1 { margin-bottom: 8px; }

  #info {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-bottom: 6px;
  }

  #difficulty, #round {
    font-size: 0.9rem;
    opacity: 0.85;
    margin-bottom: 6px;
  }

  button {
    padding: 12px 16px;
    margin: 6px;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #333;
    color: white;
  }

  #choices {
    margin-top: 10px;
  }

  #status {
    margin-top: 14px;
    min-height: 24px;
    font-size: 1.05rem;
  }

  #toggle {
    margin-top: 10px;
    background: #222;
  }

  .correct { background: #0a3 !important; }
  .wrong { background: #a00 !important; }
</style>
</head>

<body>

<div id="game">
  <h1>Beeps Count</h1>

  <div id="info">Guess how many beeps (2–6)</div>

  <div id="difficulty"></div>
  <div id="round"></div>

  <button id="toggle">Non-linear mode: OFF</button>

  <div id="choices">
    <button onclick="guess(2)">2</button>
    <button onclick="guess(3)">3</button>
    <button onclick="guess(4)">4</button>
    <button onclick="guess(5)">5</button>
    <button onclick="guess(6)">6</button>
  </div>

  <div id="status">Press SPACE to play</div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let minGap = parseFloat(localStorage.getItem("gap")) || 0.55;
let nonLinear = false;

let roundActive = false;
let correctAnswer = 0;

let round = 0;
let score = 0;
const MAX_ROUNDS = 20;

/* ---------- SOUND ---------- */

function playBeep(time) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 520;

  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.exponentialRampToValueAtTime(0.2, time + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(time);
  osc.stop(time + 0.25);
}

/* ---------- UI ---------- */

function getDifficultyLabel() {
  if (minGap <= 0.45) return "Hard";
  if (minGap <= 0.65) return "Medium";
  return "Easy";
}

function updateUI() {
  document.getElementById("difficulty").textContent =
    `Difficulty: ${getDifficultyLabel()} (gap ${minGap.toFixed(2)}s)`;

  document.getElementById("round").textContent =
    `Round: ${round}/${MAX_ROUNDS} | Score: ${score}`;
}

/* ---------- GAME ---------- */

function generatePattern(count) {
  const base = minGap;
  let times = [audioCtx.currentTime + 0.2];

  for (let i = 1; i < count; i++) {
    let gap = base;

    if (nonLinear) {
      gap *= (0.6 + Math.random() * 0.9);
    }

    times.push(times[i - 1] + gap);
  }

  return times;
}

/* ---------- ROUND ---------- */

async function playRound() {
  if (round >= MAX_ROUNDS) {
    document.getElementById("status").textContent =
      `Game over! Final score: ${score}/${MAX_ROUNDS}`;
    return;
  }

  roundActive = true;
  round++;

  correctAnswer = Math.floor(Math.random() * 5) + 2;

  updateUI();

  document.getElementById("status").textContent =
    "Listen carefully...";

  const times = generatePattern(correctAnswer);

  for (let t of times) {
    playBeep(t);
  }

  document.getElementById("status").textContent =
    "How many beeps?";
}

/* ---------- FEEDBACK ---------- */

function flash(correct) {
  document.body.classList.add(correct ? "correct" : "wrong");

  setTimeout(() => {
    document.body.classList.remove("correct", "wrong");
  }, 250);
}

/* ---------- GUESS ---------- */

function guess(n) {
  if (!roundActive) return;

  const correct = (n === correctAnswer);

  flash(correct);

  if (correct) {
    score++;
    minGap *= 0.92; // harder
    document.getElementById("status").textContent = "Correct!";
  } else {
    minGap *= 1.08; // easier (FIXED RESTORED BEHAVIOR)
    document.getElementById("status").textContent =
      "Wrong! It was " + correctAnswer;
  }

  localStorage.setItem("gap", minGap.toString());

  roundActive = false;
  updateUI();

  setTimeout(() => {
    if (round >= MAX_ROUNDS) {
      document.getElementById("status").textContent =
        `Game complete! Score: ${score}/${MAX_ROUNDS}`;
    } else {
      document.getElementById("status").textContent =
        "Press SPACE for next round";
    }
  }, 700);
}

/* ---------- TOGGLE ---------- */

document.getElementById("toggle").onclick = () => {
  nonLinear = !nonLinear;
  document.getElementById("toggle").textContent =
    "Non-linear mode: " + (nonLinear ? "ON" : "OFF");
};

/* ---------- INPUT ---------- */

document.addEventListener("keydown", async (e) => {
  await audioCtx.resume();

  if (e.code === "Space") {
    playRound();
  }

  if (["Digit2","Digit3","Digit4","Digit5","Digit6"].includes(e.code)) {
    guess(parseInt(e.key));
  }

  if (["Numpad2","Numpad3","Numpad4","Numpad5","Numpad6"].includes(e.code)) {
    guess(parseInt(e.key));
  }
});

/* ---------- INIT ---------- */
updateUI();

</script>
</body>
</html>

</body>
</html>
