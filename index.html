<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beeps Count Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  #game {
    text-align: center;
    width: 92%;
    max-width: 520px;
  }

  h1 { margin-bottom: 8px; }

  #info {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-bottom: 6px;
  }

  #difficulty, #round {
    font-size: 0.9rem;
    opacity: 0.85;
    margin-bottom: 6px;
  }

  button {
    padding: 12px 16px;
    margin: 6px;
    font-size: 1.1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #333;
    color: white;
  }

  #choices {
    margin-top: 10px;
  }

  #status {
    margin-top: 14px;
    min-height: 24px;
    font-size: 1.05rem;
  }

  #toggle {
    margin-top: 10px;
    background: #222;
  }

  .correct { background: #0a3 !important; }
  .wrong { background: #a00 !important; }
</style>
</head>

<body>

<div id="game">
  <h1>Beeps Count</h1>

  <div id="info">Guess how many beeps (2–6)</div>

  <div id="difficulty"></div>
  <div id="round"></div>

  <button id="toggle">Non-linear mode: OFF</button>

  <div id="choices">
    <button onclick="guess(2)">2</button>
    <button onclick="guess(3)">3</button>
    <button onclick="guess(4)">4</button>
    <button onclick="guess(5)">5</button>
    <button onclick="guess(6)">6</button>
  </div>

  <div id="status">Press SPACE to play</div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/* ---------- STATE ---------- */
const STATE = {
  IDLE: "idle",
  PLAYING: "playing",
  ROUND_END: "round_end",
  GAME_OVER: "game_over"
};

let gameState = STATE.IDLE;
let inputLocked = false;

/* ---------- GAME DATA ---------- */
let minGap = parseFloat(localStorage.getItem("gap")) || 0.55;
let nonLinear = false;

let round = 0;
let score = 0;
const MAX_ROUNDS = 20;

let correctAnswer = 0;

/* ---------- AUDIO ---------- */
function playBeep(time) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.value = 520;

  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.exponentialRampToValueAtTime(0.2, time + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(time);
  osc.stop(time + 0.25);
}

/* ---------- UI ---------- */
function getDifficultyLabel() {
  if (minGap <= 0.45) return "Hard";
  if (minGap <= 0.65) return "Medium";
  return "Easy";
}

function updateUI() {
  document.getElementById("difficulty").textContent =
    `Difficulty: ${getDifficultyLabel()} (gap ${minGap.toFixed(2)}s)`;

  document.getElementById("round").textContent =
    `Round: ${round}/${MAX_ROUNDS} | Score: ${score}`;
}

/* ---------- PATTERN ---------- */
function generatePattern(count) {
  const base = minGap;
  let times = [audioCtx.currentTime + 0.2];

  for (let i = 1; i < count; i++) {
    let gap = base;

    if (nonLinear) {
      // 🔥 stronger variation so it is actually noticeable
      gap *= (0.4 + Math.random() * 1.4);
    }

    times.push(times[i - 1] + gap);
  }

  return times;
}

/* ---------- ROUND ---------- */
async function startRound() {
  if (inputLocked) return;
  if (gameState === STATE.GAME_OVER) return;

  inputLocked = true;
  gameState = STATE.PLAYING;

  if (round >= MAX_ROUNDS) {
    endGame();
    return;
  }

  round++;
  correctAnswer = Math.floor(Math.random() * 5) + 2;

  updateUI();

  document.getElementById("status").textContent =
    "Listen carefully...";

  const times = generatePattern(correctAnswer);

  const lastTime = times[times.length - 1];

  for (let t of times) playBeep(t);

  /* 🔥 FIX: unlock based on actual audio end, not fixed timeout */
  const unlockDelay =
    (lastTime - audioCtx.currentTime) * 1000 + 250;

  setTimeout(() => {
    gameState = STATE.PLAYING;
    inputLocked = false;

    document.getElementById("status").textContent =
      "How many beeps?";
  }, Math.max(300, unlockDelay));
}

/* ---------- ROUND END ---------- */
function endRound(correct) {
  gameState = STATE.ROUND_END;
  inputLocked = true;

  flash(correct);

  if (correct) {
    score++;
    minGap *= 0.92;
    document.getElementById("status").textContent = "Correct!";
  } else {
    minGap *= 1.08;
    document.getElementById("status").textContent =
      "Wrong! It was " + correctAnswer;
  }

  localStorage.setItem("gap", minGap.toString());
  updateUI();

  setTimeout(() => {
    if (round >= MAX_ROUNDS) {
      endGame();
    } else {
      gameState = STATE.IDLE;
      inputLocked = false;

      document.getElementById("status").textContent =
        "Press SPACE for next round";
    }
  }, 500);
}

/* ---------- GAME OVER ---------- */
function endGame() {
  gameState = STATE.GAME_OVER;
  inputLocked = false;

  document.getElementById("status").textContent =
    `Game over! Score: ${score}/${MAX_ROUNDS}. Press SPACE to restart.`;
}

/* ---------- RESET ---------- */
function resetGame() {
  round = 0;
  score = 0;
  minGap = parseFloat(localStorage.getItem("gap")) || 0.55;

  gameState = STATE.IDLE;
  inputLocked = false;

  updateUI();

  document.getElementById("status").textContent =
    "Restarted! Press SPACE to play";
}

/* ---------- FEEDBACK ---------- */
function flash(correct) {
  document.body.classList.add(correct ? "correct" : "wrong");

  setTimeout(() => {
    document.body.classList.remove("correct", "wrong");
  }, 250);
}

/* ---------- GUESS ---------- */
function guess(n) {
  if (gameState !== STATE.PLAYING || inputLocked) return;

  const correct = (n === correctAnswer);
  endRound(correct);
}

/* ---------- TOGGLE ---------- */
document.getElementById("toggle").onclick = () => {
  nonLinear = !nonLinear;
  document.getElementById("toggle").textContent =
    "Non-linear mode: " + (nonLinear ? "ON" : "OFF");
};

/* ---------- INPUT ---------- */
document.addEventListener("keydown", async (e) => {
  await audioCtx.resume();

  if (e.code === "Space") {
    if (gameState === STATE.GAME_OVER) {
      resetGame();
      return;
    }
    startRound();
  }

  const keyMap = {
    Digit2: 2, Digit3: 3, Digit4: 4, Digit5: 5, Digit6: 6,
    Numpad2: 2, Numpad3: 3, Numpad4: 4, Numpad5: 5, Numpad6: 6
  };

  if (keyMap[e.code]) {
    guess(keyMap[e.code]);
  }
});

/* ---------- INIT ---------- */
updateUI();

</script>

</body>
</html>
